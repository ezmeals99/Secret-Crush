<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Poppins', sans-serif; background: #0f0f1a; color: white; text-align: center; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .hero { margin: 20px; padding: 40px; border-radius: 30px; background: linear-gradient(135deg,#6a11cb,#2575fc); font-size: 32px; }
        .box { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        h2 { font-size: 48px; color: #ff4081; margin-bottom: 20px; }
        h3 { font-size: 36px; margin-bottom: 40px; }
        button { 
            padding: 25px 60px; 
            font-size: 32px; 
            border-radius: 60px; 
            border: none; 
            margin: 15px; 
            cursor: pointer; 
            font-weight: bold;
        }
        #yes { background: #00e676; color: black; width: 80%; max-width: 300px; }
        #no { background: #ff1744; color: white; position: absolute; min-width: 150px; }
    </style>
</head>
<body>

<div class="hero">✨ Someone has a message ✨</div>

<div class="box">
    <h2 id="names">Loading...</h2>
    <h3 id="question">Do you love me back? 💖</h3>
    <button id="yes">YES 💚</button>
    <button id="no">NO 💔</button>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const your = params.get("your") || "Someone";
    const crush = params.get("crush") || "You";

    document.getElementById("names").innerText = `${crush}, ${your} likes you! ❤️`;

    document.getElementById("yes").onclick = () => {
        document.body.innerHTML = `<h1 style="font-size:60px; margin-top:100px;">💖 IT'S A MATCH! 💖</h1><p style="font-size:30px;">Go talk to ${your}!</p>`;
    };

    const noBtn = document.getElementById("no");
    function moveButton() {
        const x = Math.random() * (window.innerWidth - 150);
        const y = Math.random() * (window.innerHeight - 100);
        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    }
    noBtn.addEventListener("mouseover", moveButton);
    noBtn.addEventListener("touchstart", (e) => { e.preventDefault(); moveButton(); });
</script>
</body>
</html>
