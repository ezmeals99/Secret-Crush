<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Secret Message for You</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .heart { font-size: 80px; color: #ff4757; margin-bottom: 20px; animation: beat 1s infinite; }
        @keyframes beat {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        h1 { font-size: 24px; padding: 0 20px; line-height: 1.6; }
        .highlight { color: #ff4757; font-weight: bold; }
    </style>
</head>
<body>

    <div>
        <div class="heart">❤️</div>
        <h1 id="msg">Loading secret message...</h1>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const your = urlParams.get('your');
        const crush = urlParams.get('crush');

        if(your && crush) {
            document.getElementById("msg").innerHTML = 
                `<span class="highlight">${your}</span> has a secret crush on <br> <span class="highlight">${crush}</span>! ✨`;
        } else {
            document.getElementById("msg").innerText = "No secret message found! 💔";
        }
    </script>

    <script src="https://pl28973099.profitablecpmratenetwork.com/28/15/63/2815632d8d4cccd2721797c3d5784304.js"></script>

</body>
</html>
