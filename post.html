<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Poppins', sans-serif; background: #0f0f1a; color: white; text-align: center; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .hero { margin: 15px; padding: 30px; border-radius: 20px; background: linear-gradient(135deg,#6a11cb,#2575fc); font-size: 22px; }
        .box { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 15px; }
        h2 { font-size: 32px; color: #ff4081; margin-bottom: 12px; }
        h3 { font-size: 25px; margin-bottom: 25px; }
        button { padding: 18px 45px; font-size: 22px; border-radius: 40px; border: none; margin: 10px; cursor: pointer; font-weight: bold; }
        #yes { background: #00e676; color: black; width: 70%; max-width: 220px; }
        #no { background: #ff1744; color: white; position: absolute; min-width: 100px; }
        .ad-container { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.5); padding: 5px 0; }
    </style>
</head>
<body>

<div class="hero">✨ Someone has a message ✨</div>

<div class="box">
    <h2 id="names">Loading...</h2>
    <h3 id="question">Do you love me back? 💖</h3>
    <button id="yes">YES 💚</button>
    <button id="no">NO 💔</button>
</div>

<div class="ad-container">
    <script async="async" data-cfasync="false" src="https://pl28973149.profitablecpmratenetwork.com/e45774a62c02b4a3476a77a874772c70/invoke.js"></script>
    <div id="container-e45774a62c02b4a3476a77a874772c70"></div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const your = params.get("your") || "Someone";
    const crush = params.get("crush") || "You";

    document.getElementById("names").innerText = `${crush}, ${your} likes you! ❤️`;

    document.getElementById("yes").onclick = () => {
        document.body.innerHTML = `<h1 style="font-size:38px; margin-top:100px;">💖 IT'S A MATCH! 💖</h1><p style="font-size:20px;">Go talk to ${your}!</p>`;
    };

    const noBtn = document.getElementById("no");
    function moveButton() {
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 150);
        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    }
    noBtn.addEventListener("mouseover", moveButton);
    noBtn.addEventListener("touchstart", (e) => { e.preventDefault(); moveButton(); });
</script>

<script src="https://pl28973099.profitablecpmratenetwork.com/28/15/63/2815632d8d4cccd2721797c3d5784304.js"></script>

</body>
</html>
