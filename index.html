<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gen Z - Secret Crush ✨</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 400px;
            border: 1px solid #333;
        }
        h1 { color: #ff4757; margin-bottom: 20px; font-size: 28px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #444;
            background: #252525;
            color: white;
            box-sizing: border-box;
        }
        .btn {
            background: #ff4757;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn:hover { background: #ff6b81; }
        #copyBtn { background: #2ed573; display: none; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>✨ Secret Crush ✨</h1>
        <p>Create a secret link to reveal a crush!</p>
        <input type="text" id="your" placeholder="Your Name">
        <input type="text" id="crush" placeholder="Crush Name">
        <button class="btn" onclick="generate()">Generate Secret Link</button>
        <button id="copyBtn" class="btn">Copy Link ❤️</button>
    </div>

    <script>
        function generate() {
            let your = document.getElementById("your").value;
            let crush = document.getElementById("crush").value;
            if(!your || !crush) return alert("Please fill both names!");

            let link = window.location.origin + window.location.pathname.replace('index.html', '') + 
                       "post.html?your="+encodeURIComponent(your)+"&crush="+encodeURIComponent(crush);
            
            let copyBtn = document.getElementById("copyBtn");
            copyBtn.style.display = "block";
            copyBtn.onclick = () => {
                navigator.clipboard.writeText(link);
                alert("Link Copied! Share it with your friends. ❤️");
            };
        }
    </script>

    <script src="https://pl28973099.profitablecpmratenetwork.com/28/15/63/2815632d8d4cccd2721797c3d5784304.js"></script>

</body>
</html>
