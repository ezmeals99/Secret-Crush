<!DOCTYPE html>
<html>
<head>
<title>Gen Z Crush</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #0f0f1a;
    color: white;
}

/* ADMIN BUTTON */
.top {
    position: fixed;
    right: 15px;
    top: 15px;
}

.adminBtn {
    background: linear-gradient(135deg,#00e5ff,#00bcd4);
    border: none;
    padding: 12px 16px;
    border-radius: 50px;
    font-size: 18px;
    cursor: pointer;
}

/* HERO */
.hero {
    margin: 20px;
    padding: 50px 20px;
    border-radius: 30px;
    background: linear-gradient(135deg,#6a11cb,#2575fc);
    text-align: center;
    font-size: 36px;
    font-weight: 700;
}

/* CARDS */
.container {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.card {
    background: #1c1c2e;
    margin: 15px;
    padding: 25px;
    border-radius: 25px;
    width: 85%;
    max-width: 350px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card h3 {
    font-size: 22px;
}

.card p {
    font-size: 16px;
}

.editBtn {
    display: none;
    background: orange;
    margin-top: 10px;
    padding: 6px 10px;
}

/* INPUT */
.inputBox {
    background: #1c1c2e;
    border-radius: 25px;
    padding: 15px;
    margin: 10px;
    border: none;
    color: white;
    width: 80%;
    font-size: 16px;
}

/* BUTTON */
.btn {
    background: #00e5ff;
    color: black;
    border: none;
    padding: 14px 28px;
    border-radius: 30px;
    font-size: 18px;
    cursor: pointer;
    margin-top: 10px;
}

.btn:active {
    transform: scale(0.9);
}

/* SECTIONS */
.section {
    display: none;
    text-align: center;
    margin-top: 30px;
}

</style>
</head>

<body>

<div class="top">
<button class="adminBtn" onclick="adminLogin()">⚙️</button>
</div>

<div class="hero" id="heroText">✨ Gen Z ✨</div>

<!-- HOME -->
<div id="home" class="container">

<div class="card" onclick="openCategory('secret')">
<h3 id="card1">Secret Crush 💖</h3>
<p id="card1desc">Send a hidden love message</p>

<button class="editBtn" onclick="edit('card1')">Edit</button>
<button class="editBtn" onclick="edit('card1desc')">Edit Desc</button>
</div>

</div>

<!-- CATEGORY -->
<div id="secret" class="section">
<h2 id="secretTitle">Secret Crush 💖</h2>
<p id="secretDesc">Create your hidden love link</p>

<button class="editBtn" onclick="edit('secretTitle')">Edit</button>
<button class="editBtn" onclick="edit('secretDesc')">Edit</button>

<br><br>
<button class="btn" onclick="openCreate()">Create New</button>
</div>

<!-- CREATE -->
<div id="create" class="section">

<input class="inputBox" id="your" placeholder="Your Name"><br>
<input class="inputBox" id="crush" placeholder="Crush Name"><br>

<button class="btn" onclick="generate()">Generate</button>

<br><br>
<button class="btn" id="copyBtn" style="display:none;">Copy Link</button>

</div>

<script>

let isAdmin = false;
let generatedLink = "";

// ADMIN
function adminLogin(){
    let pass = prompt("Password:");
    if(pass === "1234"){
        isAdmin = true;
        document.querySelectorAll(".editBtn").forEach(b=>b.style.display="inline");
        alert("Admin Mode ON");
    }
}

// EDIT
function edit(id){
    let el = document.getElementById(id);
    let val = prompt("Edit:", el.innerText);
    if(val){
        el.innerText = val;
        localStorage.setItem(id, val);
    }
}

// LOAD
function load(){
    let ids = ["heroText","card1","card1desc","secretTitle","secretDesc"];
    ids.forEach(id=>{
        let val = localStorage.getItem(id);
        if(val) document.getElementById(id).innerText = val;
    });
}

// NAV
function openCategory(id){
    document.getElementById("home").style.display="none";
    document.getElementById(id).style.display="block";
}

function openCreate(){
    document.getElementById("secret").style.display="none";
    document.getElementById("create").style.display="block";
}

// GENERATE
function generate(){
    let your = document.getElementById("your").value;
    let crush = document.getElementById("crush").value;

    generatedLink = window.location.origin + window.location.pathname +
    "post.html?your="+your+"&crush="+crush;

    document.getElementById("copyBtn").style.display="inline";
}

// COPY
document.getElementById("copyBtn").onclick = () => {
    navigator.clipboard.writeText(generatedLink);
    alert("Copied!");
}

load();

</script>

</body>
</html>
