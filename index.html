<!DOCTYPE html>
<html>
<head>
<title>Gen Z Crush</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #0f0f1a;
    color: white;
}

/* HERO */
.hero {
    margin: 20px;
    padding: 40px;
    border-radius: 30px;
    background: linear-gradient(135deg,#6a11cb,#2575fc);
    text-align: center;
    font-size: 40px;
    font-weight: 600;
}

/* CARDS */
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    background: #1c1c2e;
    margin: 15px;
    padding: 20px;
    border-radius: 20px;
    width: 250px;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.editBtn {
    display: none;
    background: orange;
    border: none;
    margin-top: 10px;
}

/* INPUT BOX */
.inputBox {
    background: #1c1c2e;
    border-radius: 20px;
    padding: 15px;
    margin: 10px;
    border: none;
    color: white;
}

/* BUTTON */
.btn {
    background: #00e5ff;
    color: black;
    border: none;
    padding: 10px 20px;
    border-radius: 20px;
    cursor: pointer;
    transition: 0.2s;
}

.btn:active {
    transform: scale(0.9);
}

/* HIDE SECTIONS */
.section {
    display: none;
    text-align: center;
    margin-top: 30px;
}

.top {
    position: absolute;
    right: 20px;
    top: 20px;
}

</style>
</head>

<body>

<div class="top">
<button class="btn" onclick="adminLogin()">Admin</button>
</div>

<!-- HERO -->
<div class="hero" id="heroText">✨ Gen Z ✨</div>

<!-- HOME CARDS -->
<div id="home" class="container">

<div class="card" onclick="openCategory('secret')">
<h3 id="card1">Secret Crush 💖</h3>
<p id="card1desc">Send a hidden love message</p>
<button class="editBtn" onclick="edit('card1')">Edit</button>
<button class="editBtn" onclick="edit('card1desc')">Edit Desc</button>
</div>

</div>

<!-- CATEGORY PAGE -->
<div id="secret" class="section">
<h2 id="secretTitle">Secret Crush 💖</h2>
<p id="secretDesc">Create your hidden love link</p>

<button class="editBtn" onclick="edit('secretTitle')">Edit</button>
<button class="editBtn" onclick="edit('secretDesc')">Edit</button>

<br><br>
<button class="btn" onclick="openCreate()">Create New</button>
</div>

<!-- CREATE PAGE -->
<div id="create" class="section">

<input class="inputBox" id="your" placeholder="Your Name"><br>
<input class="inputBox" id="crush" placeholder="Crush Name"><br>

<button class="btn" onclick="generate()">Generate</button>

<br><br>
<button class="btn" id="copyBtn" style="display:none;">Copy Link</button>

</div>

<script>

let isAdmin = false;
let generatedLink = "";

// ADMIN LOGIN
function adminLogin(){
    let pass = prompt("Password:");
    if(pass === "1234"){
        isAdmin = true;
        document.querySelectorAll(".editBtn").forEach(b=>b.style.display="inline");
        alert("Admin Mode ON");
    }
}

// EDIT FUNCTION
function edit(id){
    let el = document.getElementById(id);
    let newText = prompt("Edit:", el.innerText);
    if(newText){
        el.innerText = newText;
        localStorage.setItem(id, newText);
    }
}

// LOAD TEXT
function load(){
    let ids = ["heroText","card1","card1desc","secretTitle","secretDesc"];
    ids.forEach(id=>{
        let saved = localStorage.getItem(id);
        if(saved) document.getElementById(id).innerText = saved;
    });
}

// NAVIGATION
function openCategory(id){
    document.getElementById("home").style.display="none";
    document.getElementById(id).style.display="block";
}

function openCreate(){
    document.getElementById("secret").style.display="none";
    document.getElementById("create").style.display="block";
}

// GENERATE LINK
function generate(){
    let your = document.getElementById("your").value;
    let crush = document.getElementById("crush").value;

    generatedLink = window.location.origin + window.location.pathname +
    "post.html?your="+your+"&crush="+crush;

    document.getElementById("copyBtn").style.display="inline";
}

// COPY BUTTON
document.getElementById("copyBtn").onclick = function(){
    navigator.clipboard.writeText(generatedLink);
    alert("Link Copied!");
}

load();

</script>

</body>
</html>
