<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gen Z Crush</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Poppins', sans-serif; background: #0f0f1a; color: white; padding-bottom: 80px; }
        
        /* ADMIN BUTTON - Enlarged for Mobile */
        .top { position: fixed; right: 20px; top: 20px; z-index: 100; }
        .adminBtn { 
            background: rgba(255,255,255,0.15); 
            border: 2px solid white; 
            color: white; 
            padding: 18px; /* Increased */
            border-radius: 50%; 
            cursor: pointer; 
            font-size: 24px; /* Increased */
        }
        
        /* HERO - Scaled Text */
        .hero { 
            margin: 25px; 
            padding: 70px 25px; 
            border-radius: 40px; 
            background: linear-gradient(135deg,#6a11cb,#2575fc); 
            text-align: center; 
            font-size: 56px; /* 32px * 1.75 */
            font-weight: 700; 
        }
        
        .container { display: flex; flex-direction: column; align-items: center; }
        
        /* CARDS - Larger touch targets */
        .card { 
            margin: 25px; 
            padding: 40px; 
            border-radius: 35px; 
            width: 85%; 
            max-width: 450px; 
            text-align: center; 
            transition: 0.3s; 
            cursor: pointer; 
            position: relative;
        }
        .card h3 { font-size: 38px; margin-bottom: 15px; } /* Scaled */
        .card p { font-size: 28px; opacity: 0.9; } /* Scaled */
        
        /* ADMIN CONTROLS */
        .admin-controls { display: none; margin-top: 30px; text-align: center; width: 100%; }
        .editBtn, .delBtn { 
            padding: 12px 20px; 
            border-radius: 10px; 
            border: none; 
            cursor: pointer; 
            margin: 8px; 
            font-size: 20px; 
        }
        .editBtn { background: orange; }
        .delBtn { background: #ff1744; color: white; }
        
        /* INPUTS - Huge for easy typing */
        .inputBox { 
            background: #1c1c2e; 
            border-radius: 40px; 
            padding: 25px; 
            margin: 15px 0; 
            border: 2px solid #444; 
            color: white; 
            width: 85%; 
            font-size: 28px; /* Scaled */
        }
        
        /* ACTION BUTTONS */
        .btn { 
            background: #00e5ff; 
            color: black; 
            border: none; 
            padding: 24px 50px; /* Scaled */
            border-radius: 60px; 
            font-size: 32px; /* Scaled */
            font-weight: 700;
            cursor: pointer; 
            margin-top: 20px;
            width: 90%;
            max-width: 400px;
        }
        
        .section { display: none; text-align: center; margin-top: 40px; padding: 25px; }
        .section h2 { font-size: 45px; }
        .section p { font-size: 28px; }
    </style>
</head>
<body>

<div class="top">
    <button class="adminBtn" onclick="adminLogin()">⚙️</button>
</div>

<div class="hero" id="heroText" onclick="editHero()">✨ Gen Z ✨</div>

<div id="home" class="container">
    <div id="cardContainer" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
    <div class="admin-controls" id="adminPanel">
        <button class="btn" style="background: #00e676;" onclick="addTab()">+ Add New Tab</button>
    </div>
</div>

<div id="createSection" class="section">
    <h2 id="viewTitle">Secret Crush</h2>
    <p id="viewDesc">Enter details</p>
    <input class="inputBox" id="your" placeholder="Your Name"><br>
    <input class="inputBox" id="crush" placeholder="Crush Name"><br>
    <button class="btn" onclick="generate()">Generate Link</button>
    <br><br>
    <button class="btn" id="copyBtn" style="display:none; background: #ff4081; color: white;">Copy Link</button>
    <br><br>
    <button onclick="location.reload()" style="background:none; border:none; color:grey; font-size: 24px; cursor:pointer; margin-top:30px;">← Back</button>
</div>

<script>
let isAdmin = false;
let tabs = JSON.parse(localStorage.getItem('tabs')) || [
    { id: 1, title: "Secret Crush 💖", desc: "Send a hidden love message", color: "linear-gradient(135deg,#1c1c2e,#2d2d44)" }
];

function adminLogin(){
    let pass = prompt("Enter Admin Password:");
    if(pass === "5522"){
        isAdmin = true;
        document.getElementById("adminPanel").style.display = "block";
        renderTabs();
    }
}

function getRandomColor() {
    const colors = [['#ff9a9e', '#fecfef'], ['#a1c4fd', '#c2e9fb'], ['#84fab0', '#8fd3f4'], ['#667eea', '#764ba2']];
    let pair = colors[Math.floor(Math.random() * colors.length)];
    return `linear-gradient(135deg, ${pair[0]}, ${pair[1]})`;
}

function renderTabs() {
    const container = document.getElementById("cardContainer");
    container.innerHTML = "";
    tabs.forEach((tab, index) => {
        const div = document.createElement("div");
        div.className = "card";
        div.style.background = tab.color || "#1c1c2e";
        div.innerHTML = `
            <div onclick="openTab(${index})">
                <h3>${tab.title}</h3>
                <p>${tab.desc}</p>
            </div>
            ${isAdmin ? `
                <button class="editBtn" onclick="editTab(${index})">Edit</button>
                <button class="delBtn" onclick="deleteTab(${index})">Delete</button>
            ` : ''}
        `;
        container.appendChild(div);
    });
}

function addTab() {
    const title = prompt("Tab Title:");
    const desc = prompt("Tab Description:");
    if(title) {
        tabs.push({ id: Date.now(), title, desc, color: getRandomColor() });
        saveAndRender();
    }
}

function saveAndRender() {
    localStorage.setItem('tabs', JSON.stringify(tabs));
    renderTabs();
}

function openTab(index) {
    document.getElementById("home").style.display = "none";
    document.getElementById("createSection").style.display = "block";
    document.getElementById("viewTitle").innerText = tabs[index].title;
    document.getElementById("viewDesc").innerText = tabs[index].desc;
}

function generate(){
    let your = document.getElementById("your").value;
    let crush = document.getElementById("crush").value;
    if(!your || !crush) return alert("Fill both names!");
    
    let link = window.location.origin + window.location.pathname.replace('index.html', '') + "post.html?your="+encodeURIComponent(your)+"&crush="+encodeURIComponent(crush);
    document.getElementById("copyBtn").style.display = "inline-block";
    document.getElementById("copyBtn").onclick = () => {
        navigator.clipboard.writeText(link);
        alert("Link Copied!");
    };
}

renderTabs();
</script>
</body>
</html>
